<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoolPinnal.in | Handcrafted Elegance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .aspect-9-16 { aspect-ratio: 9 / 16; }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 font-sans">

    <header class="sticky top-0 bg-white shadow-sm z-50 p-4 text-center">
        <h1 class="text-2xl font-bold tracking-widest text-teal-800">NOOLPINNAL.IN</h1>
    </header>

    <main class="max-w-6xl mx-auto p-6">
        <div id="store-front"></div>

        <hr class="my-12 border-stone-200">

        <section class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow-md">
            <h2 class="text-xl font-bold mb-6 border-b pb-2">Checkout Details</h2>
            <form id="checkout-form" class="space-y-4">
                <input type="text" id="name" placeholder="Full Name" class="w-full p-3 border rounded" required>
                <input type="tel" id="mobile" placeholder="Mobile Number" class="w-full p-3 border rounded" required>
                <input type="email" id="email" placeholder="Email Address" class="w-full p-3 border rounded" required>
                <textarea id="address" placeholder="Shipping Address" class="w-full p-3 border rounded" rows="3" required></textarea>
                
                <div class="bg-stone-100 p-4 rounded-lg mt-6">
                    <h3 class="font-bold mb-3">Order Summary</h3>
                    <div id="cart-items" class="space-y-2 text-sm"></div>
                    <div class="border-t mt-4 pt-4 space-y-1">
                        <div class="flex justify-between"><span>Subtotal</span><span id="subtotal">₹0</span></div>
                        <div class="flex justify-between"><span>Shipping</span><span id="shipping">₹0</span></div>
                        <div class="flex justify-between font-bold text-lg text-teal-900"><span>Grand Total</span><span id="total">₹0</span></div>
                    </div>
                </div>

                <button type="submit" class="w-full bg-teal-800 text-white font-bold py-4 rounded hover:bg-teal-900 transition">
                    PLACE ORDER VIA WHATSAPP
                </button>
            </form>
        </section>
    </main>

    <script>
        // Store Configuration & Data
        const storeData = {
            config: { whatsapp_number: "919876543210", shipping_fee: 100, currency: "₹" },
            categories: ["Handloom Sarees", "Stoles & Scarves"],
            products: [
                { id: 1, name: "Kanchipuram Silk", category: "Handloom Sarees", price: 4500, img: "https://images.unsplash.com/photo-1610030469983-98e550d6193c?q=80&w=1080&h=1920&auto=format&fit=crop" },
                { id: 2, name: "Cotton Weave", category: "Handloom Sarees", price: 2200, img: "https://images.unsplash.com/photo-1583391733956-3750e0ff4e8b?q=80&w=1080&h=1920&auto=format&fit=crop" },
                { id: 3, name: "Indigo Stole", category: "Stoles & Scarves", price: 850, img: "https://images.unsplash.com/photo-1520903920243-00d872a2d1c9?q=80&w=1080&h=1920&auto=format&fit=crop" }
            ]
        };

        let cart = [];

        // Render Products by Category
        const storeContainer = document.getElementById('store-front');
        storeData.categories.forEach(cat => {
            const section = document.createElement('section');
            section.className = "mb-12";
            section.innerHTML = `<h2 class="text-2xl font-serif italic mb-6 text-stone-600">${cat}</h2>
                                 <div class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>`;
            
            storeData.products.filter(p => p.category === cat).forEach(prod => {
                const card = document.createElement('div');
                card.className = "group";
                card.innerHTML = `
                    <div class="aspect-9-16 overflow-hidden bg-gray-200 rounded-lg">
                        <img src="${prod.img}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                    </div>
                    <div class="mt-4 flex justify-between items-start">
                        <div>
                            <h3 class="text-lg font-medium">${prod.name}</h3>
                            <p class="text-teal-800 font-bold">${storeData.config.currency}${prod.price}</p>
                        </div>
                        <div class="flex flex-col items-end gap-2">
                            <input type="number" id="qty-${prod.id}" value="1" min="1" class="w-12 border p-1 text-center text-sm">
                            <button onclick="addToCart(${prod.id})" class="bg-stone-800 text-white text-xs px-3 py-2 rounded uppercase tracking-tighter">Add to Cart</button>
                        </div>
                    </div>`;
                section.querySelector('div').appendChild(card);
            });
            storeContainer.appendChild(section);
        });

        // Cart Logic
        function addToCart(id) {
            const product = storeData.products.find(p => p.id === id);
            const qty = parseInt(document.getElementById(`qty-${id}`).value);
            const existing = cart.find(item => item.id === id);
            
            if(existing) existing.qty += qty;
            else cart.push({...product, qty});
            
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cart-items');
            list.innerHTML = cart.map(item => `
                <div class="flex justify-between">
                    <span>${item.name} (x${item.qty})</span>
                    <span>${storeData.config.currency}${item.price * item.qty}</span>
                </div>
            `).join('');

            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            const ship = subtotal > 0 ? storeData.config.shipping_fee : 0;
            
            document.getElementById('subtotal').innerText = `${storeData.config.currency}${subtotal}`;
            document.getElementById('shipping').innerText = `${storeData.config.currency}${ship}`;
            document.getElementById('total').innerText = `${storeData.config.currency}${subtotal + ship}`;
        }

        // WhatsApp Checkout
        document.getElementById('checkout-form').addEventListener('submit', (e) => {
            e.preventDefault();
            if(cart.length === 0) return alert("Cart is empty!");

            const name = document.getElementById('name').value;
            const address = document.getElementById('address').value;
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            const total = subtotal + storeData.config.shipping_fee;

            let message = `*New Order from NoolPinnal.in*%0A%0A`;
            message += `*Customer:* ${name}%0A`;
            message += `*Address:* ${address}%0A%0A`;
            message += `*Items:*%0A`;
            cart.forEach(item => {
                message += `- ${item.name} x ${item.qty} (${storeData.config.currency}${item.price * item.qty})%0A`;
            });
            message += `%0A*Total:* ${storeData.config.currency}${total}`;

            window.open(`https://wa.me/${storeData.config.whatsapp_number}?text=${message}`, '_blank');
        });
    </script>
</body>
</html>
