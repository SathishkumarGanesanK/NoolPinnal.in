<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoolPinnal | Artisanal Weaves</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Playfair+Display:italic,wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .serif { font-family: 'Playfair Display', serif; }
        .aspect-9-16 { aspect-ratio: 9 / 16; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
    </style>
</head>
<body class="bg-[#FDFCFB] text-[#2D2A26]">

    <nav class="sticky top-0 z-50 glass border-b border-stone-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img id="nav-logo" src="" alt="Logo" class="h-10 w-10 rounded-full object-cover hidden">
                <span id="nav-brand" class="text-xl font-bold tracking-tight text-[#1A3A3A]"></span>
            </div>
            <div class="flex items-center gap-6">
                <a href="#checkout" class="relative">
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-orange-600 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-bold">0</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                    </svg>
                </a>
            </div>
        </div>
    </nav>

    <header class="py-20 text-center px-4">
        <img id="hero-logo" src="" alt="NoolPinnal" class="h-32 mx-auto mb-8 transition-opacity duration-500 opacity-0">
        <h1 class="serif text-5xl md:text-6xl text-[#1A3A3A] mb-4">Elegance in every knot.</h1>
        <p class="text-stone-400 uppercase tracking-[0.3em] text-xs">Curated Handloom Collection</p>
    </header>

    <main class="max-w-7xl mx-auto px-6">
        <div id="catalog" class="space-y-24"></div>

        <section id="checkout" class="py-32 grid grid-cols-1 lg:grid-cols-12 gap-16 border-t mt-32">
            <div class="lg:col-span-7">
                <h2 class="serif text-3xl mb-8">Shipping Details</h2>
                <form id="order-form" class="space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="relative">
                            <input type="text" id="name" placeholder=" " class="peer w-full border-b border-stone-300 py-2 focus:border-[#1A3A3A] outline-none bg-transparent">
                            <label class="absolute left-0 -top-3.5 text-stone-400 text-xs transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:top-2 peer-focus:-top-3.5 peer-focus:text-xs">Full Name</label>
                        </div>
                        <div class="relative">
                            <input type="tel" id="phone" placeholder=" " class="peer w-full border-b border-stone-300 py-2 focus:border-[#1A3A3A] outline-none bg-transparent">
                            <label class="absolute left-0 -top-3.5 text-stone-400 text-xs transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:top-2 peer-focus:-top-3.5 peer-focus:text-xs">WhatsApp Number</label>
                        </div>
                    </div>
                    <div class="relative">
                        <input type="email" id="email" placeholder=" " class="peer w-full border-b border-stone-300 py-2 focus:border-[#1A3A3A] outline-none bg-transparent">
                        <label class="absolute left-0 -top-3.5 text-stone-400 text-xs transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:top-2 peer-focus:-top-3.5 peer-focus:text-xs">Email Address</label>
                    </div>
                    <div class="relative">
                        <textarea id="address" placeholder=" " rows="3" class="peer w-full border-b border-stone-300 py-2 focus:border-[#1A3A3A] outline-none bg-transparent"></textarea>
                        <label class="absolute left-0 -top-3.5 text-stone-400 text-xs transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:top-2 peer-focus:-top-3.5 peer-focus:text-xs">Shipping Address</label>
                    </div>
                </form>
            </div>

            <div class="lg:col-span-5 bg-stone-50 p-10 rounded-3xl h-fit">
                <h3 class="text-xl font-bold mb-8 flex justify-between">
                    <span>Your Bag</span>
                    <span id="bag-total-count" class="text-stone-400 font-normal">0 Items</span>
                </h3>
                <div id="cart-items" class="space-y-6 mb-10 overflow-y-auto max-h-[400px]"></div>
                
                <div class="space-y-3 pt-6 border-t border-stone-200">
                    <div class="flex justify-between text-stone-500"><span>Subtotal</span><span id="sub-price">₹0</span></div>
                    <div class="flex justify-between text-stone-500"><span>Shipping</span><span id="ship-price">₹0</span></div>
                    <div class="flex justify-between text-2xl font-bold text-[#1A3A3A] pt-4 border-t border-stone-200">
                        <span>Grand Total</span><span id="grand-price">₹0</span>
                    </div>
                </div>
                <button type="submit" form="order-form" class="w-full mt-10 bg-[#1A3A3A] text-white py-5 rounded-2xl font-bold tracking-widest hover:shadow-xl hover:-translate-y-1 transition-all duration-300">
                    PLACE ORDER VIA WHATSAPP
                </button>
            </div>
        </section>
    </main>

    <footer class="py-20 text-center border-t border-stone-100 text-stone-400 text-xs tracking-widest uppercase">
        &copy; 2026 NoolPinnal.in | Handwoven with Love
    </footer>

    <script>
        let storeData = {};
        let cart = [];

        async function initStore() {
            try {
                const res = await fetch('products.json');
                storeData = await res.json();
                
                // Set Logo and Config
                document.getElementById('nav-logo').src = storeData.config.logo_url;
                document.getElementById('nav-logo').classList.remove('hidden');
                document.getElementById('hero-logo').src = storeData.config.logo_url;
                document.getElementById('hero-logo').classList.replace('opacity-0', 'opacity-100');
                document.getElementById('nav-brand').innerText = storeData.config.store_name;
                
                renderProducts();
            } catch (e) {
                console.error("Store load failed:", e);
                document.getElementById('catalog').innerHTML = `<p class="text-center py-20 text-red-400">Error loading store data. Make sure products.json is in the same folder.</p>`;
            }
        }

        function renderProducts() {
            const catalog = document.getElementById('catalog');
            catalog.innerHTML = '';

            storeData.categories.forEach(cat => {
                const products = storeData.products.filter(p => p.category === cat);
                if(products.length === 0) return;

                const section = document.createElement('section');
                section.innerHTML = `
                    <h2 class="text-xs uppercase tracking-[0.4em] mb-12 text-stone-400 flex items-center gap-4">
                        <span class="bg-stone-100 h-[1px] flex-grow"></span>
                        ${cat}
                        <span class="bg-stone-100 h-[1px] flex-grow"></span>
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-12 gap-y-20">
                        ${products.map(p => `
                            <div class="group relative">
                                <div class="aspect-9-16 overflow-hidden rounded-2xl bg-stone-100">
                                    <img src="${p.image}" class="w-full h-full object-cover transition duration-1000 group-hover:scale-110">
                                </div>
                                <div class="mt-8 flex justify-between items-end">
                                    <div>
                                        <h3 class="text-xl font-light">${p.name}</h3>
                                        <p class="text-lg font-bold text-[#1A3A3A] mt-1">${storeData.config.currency}${p.price}</p>
                                    </div>
                                    <div class="flex items-center bg-white shadow-2xl rounded-xl border border-stone-100 p-1">
                                        <input type="number" id="qty-${p.id}" value="1" min="1" class="w-10 text-center font-bold text-sm bg-transparent outline-none">
                                        <button onclick="addToCart(${p.id})" class="bg-[#1A3A3A] text-white p-2 rounded-lg hover:bg-black transition">
                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                                            </svg>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                catalog.appendChild(section);
            });
        }

        function addToCart(id) {
            const product = storeData.products.find(p => p.id === id);
            const qty = parseInt(document.getElementById(`qty-${id}`).value);
            const existing = cart.find(item => item.id === id);

            if(existing) existing.qty += qty;
            else cart.push({...product, qty});

            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cart-items');
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            const ship = subtotal > 0 ? storeData.config.shipping_fee : 0;

            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('bag-total-count').innerText = `${cart.length} Items`;
            document.getElementById('sub-price').innerText = `${storeData.config.currency}${subtotal}`;
            document.getElementById('ship-price').innerText = `${storeData.config.currency}${ship}`;
            document.getElementById('grand-price').innerText = `${storeData.config.currency}${subtotal + ship}`;

            list.innerHTML = cart.length ? cart.map(item => `
                <div class="flex gap-4 items-center animate-fade-in">
                    <img src="${item.image}" class="w-16 h-20 object-cover rounded-lg shadow-sm">
                    <div class="flex-grow">
                        <h4 class="font-bold text-sm text-[#1A3A3A]">${item.name}</h4>
                        <p class="text-xs text-stone-400">Qty: ${item.qty} × ${storeData.config.currency}${item.price}</p>
                    </div>
                    <span class="font-bold text-sm">${storeData.config.currency}${item.price * item.qty}</span>
                </div>
            `).join('') : `<div class="text-center py-10 text-stone-300 italic">Your bag is empty</div>`;
        }

        document.getElementById('order-form').addEventListener('submit', (e) => {
            e.preventDefault();
            if(!cart.length) return alert("Your bag is empty!");

            const name = document.getElementById('name').value;
            const address = document.getElementById('address').value;
            const phone = document.getElementById('phone').value;
            
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            const total = subtotal + storeData.config.shipping_fee;

            let text = `*NEW ORDER - ${storeData.config.store_name}*%0A`;
            text += `---------------------------%0A`;
            text += `*Customer:* ${name}%0A`;
            text += `*WhatsApp:* ${phone}%0A`;
            text += `*Shipping Address:* ${address}%0A%0A`;
            text += `*BAG ITEMS:*%0A`;
            cart.forEach(item => {
                text += `• ${item.name} (x${item.qty}) - ${storeData.config.currency}${item.price * item.qty}%0A`;
            });
            text += `%0A*Subtotal:* ${storeData.config.currency}${subtotal}%0A`;
            text += `*Shipping:* ${storeData.config.currency}${storeData.config.shipping_fee}%0A`;
            text += `*GRAND TOTAL:* ${storeData.config.currency}${total}%0A`;
            text += `---------------------------`;

            window.open(`https://wa.me/${storeData.config.whatsapp_number}?text=${text}`, '_blank');
        });

        initStore();
    </script>
</body>
</html>
